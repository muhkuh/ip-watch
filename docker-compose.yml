services:
  probe-host:
    build:
      context: ./probe-host
    container_name: ip-watch-probe-host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      PING_TIMEOUT_SEC: 1
      HTTP_TIMEOUT_MS: 1500
      ENABLE_HTTP_BY_DEFAULT: "false"
      PROBE_API_TOKEN: ""
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    container_name: ip-watch-web
    depends_on:
      probe-host:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
